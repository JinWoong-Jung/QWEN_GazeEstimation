model:
  # Hugging Face model repo id.
  # Examples:
  # - Qwen/Qwen3-VL-8B-Instruct
  # - Qwen/Qwen3-VL-30B-A3B-Instruct
  repo_id: "Qwen/Qwen3-VL-8B-Instruct"
  # Model is always stored at: model/<model_name>
  # Cache is always stored at: model/cache
  trust_remote_code: true
  torch_dtype: "auto"   # auto | float16 | bfloat16 | float32
  device: "auto"        # auto | cpu | cuda | mps
  download_if_missing: true

input:
  mode: "batch"         # batch | single

  # batch mode
  image_dir: "100_imgs"
  prompt_dir: "100_imgs_prompt"
  image_extensions: [".jpg", ".jpeg", ".png", ".webp", ".bmp"]

  # single mode (used only when input.mode == single)
  image_path: ""
  prompt_path: ""
  prompt_text: ""

generation:
  max_new_tokens: 16
  temperature: 0.0
  top_p: 1.0
  do_sample: false

output:
  # Outputs are always saved at: 100_imgs_output/<model_name>
  overwrite: false
